/* ══════════════════════════════════════════
   YOURDIS — SHARED STYLESHEET
   Used by all pages. Page-specific rules are
   grouped at the bottom.
══════════════════════════════════════════ */

/* ─── Tokens ─── */
:root {
  --crimson: #79002F;
  --gold: #EAA005;
  --gold-pale: #fdf3da;
  --cream: #FDF6EE;
  --parchment: #F5EDE0;
  --cashback-bg: #F7EFE5;
  --ink: #1a0a0f;
  --muted: #7a5f68;
  --border: rgba(121,0,47,0.11);
  --white: #ffffff;
  --radius: 20px;
  --radius-sm: 12px;
}

/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); overflow-x: hidden; }
body.ar { font-family: 'Cairo', sans-serif; direction: rtl; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ─── Shared Nav (inner pages) ─── */
.site-nav {
  background: var(--white); border-bottom: 1.5px solid var(--border);
  padding: 16px 24px;

}
.site-nav .nav-logo img { height: 34px; width: auto; display: block; }
.site-nav .nav-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }

.site-nav .nav-link {

}
.site-nav .nav-link:hover,

  background: rgba(121,0,47,0.08);
  color: var(--crimson);

}

.site-nav .nav-logo a { display: inline-flex; align-items: center; gap: 8px; }
.nav-lang-toggle {

  transition: background 0.2s, color 0.2s;
}

/* ─── Shared Sections ─── */
section { padding: 100px 24px; }

<script>
/**
 * Yourdis — i18n Engine
 * ─────────────────────────────────────────
 * Reads from the global `translations` object (translations.js).
 * Used by all pages.
 */

let currentLang = localStorage.getItem('yd_lang') || 'en';

function t(key) {
  const entry = translations[key];
  if (!entry) { console.warn('[i18n] missing key:', key); return key; }
  return entry[currentLang] ?? entry['en'] ?? key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t(el.dataset.i18n);
  });
}

function applyLang() {
  const isAr = currentLang === 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = isAr ? 'rtl' : 'ltr';
  document.body.classList.toggle('ar', isAr);
  document.body.classList.toggle('en', !isAr);
  applyTranslations();
  // Update any visible lang toggles
  document.querySelectorAll('.js-lang-toggle').forEach(el => {
    el.textContent = isAr ? 'English' : 'العربية';
  });
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  localStorage.setItem('yd_lang', currentLang);
  applyLang();
  // If page has a marquee, rebuild it
  if (typeof buildMarquee === 'function') buildMarquee();
}

</script>

<script>
/**
 * Yourdis — App Script
 * ─────────────────────────────────────────
 * Handles: marquee, scroll reveal, analytics.
 * Loaded only by index.html (landing page).
 */

/* ── Marquee ── */
function buildMarquee() {
  const track = document.getElementById('marquee-track');
  if (!track || !Array.isArray(stores)) return;
  const makePills = () => stores.map(s => {
    const name = s[currentLang] ?? s['en'];
    return `<div class="store-pill"><div class="store-pill-dot"></div><span class="store-pill-name">${name}</span></div>`;
  }).join('');
  track.innerHTML = makePills() + makePills();
}

/* ── Scroll reveal ── */
const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.fade-up').forEach(el => revealObs.observe(el));

/* ── Analytics helpers ── */
function trackEvent(name, params) {
  if (typeof gtag === 'function') gtag('event', name, params || {});
}
document.getElementById('btn-appstore')?.addEventListener('click', () => {
  trackEvent('app_download_click', { store: 'app_store', page_lang: currentLang });
}, { passive: true });
document.getElementById('btn-googleplay')?.addEventListener('click', () => {
  trackEvent('app_download_click', { store: 'google_play', page_lang: currentLang });
}, { passive: true });

/* ── Init ── */
applyLang();
buildMarquee();

</script>
