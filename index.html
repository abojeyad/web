/* ══════════════════════════════════════════
   YOURDIS — SHARED STYLESHEET
   Used by all pages. Page-specific rules are
   grouped at the bottom.
══════════════════════════════════════════ */

/* ─── Tokens ─── */
:root {
  --crimson: #79002F;
  --crimson-deep: #4C0025;
  --gold: #EAA005;
  --gold-pale: #fdf3da;
  --cream: #FDF6EE;
  --parchment: #F5EDE0;
  --cashback-bg: #F7EFE5;
  --ink: #1a0a0f;
  --muted: #7a5f68;
  --border: rgba(121,0,47,0.11);
  --white: #ffffff;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-lg: 28px;

  /* Spacing scale (4/8pt rhythm) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;
  --space-9: 96px;

  /* Elevation scale */
  --shadow-sm: 0 2px 12px rgba(121,0,47,0.07);
  --shadow-md: 0 8px 28px rgba(121,0,47,0.09);
  --shadow-lg: 0 18px 52px rgba(121,0,47,0.12);
  --shadow-xl: 0 28px 80px rgba(121,0,47,0.16);

  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur-base: 250ms;
  --dur-slow: 400ms;
}

/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); overflow-x: hidden; }
body.ar { font-family: 'Cairo', sans-serif; direction: rtl; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ─── Focus & Motion ─── */
a:focus-visible, button:focus-visible {
  outline: 2.5px solid var(--crimson);
  outline-offset: 3px;
  border-radius: 4px;

/* ─── Shared Sections ─── */
section { padding: 100px 24px; }

}

/* ─── Animations ─── */

.fade-up.visible { opacity: 1; transform: translateY(0); }

<script>
/**
 * Yourdis — i18n Engine
 * ─────────────────────────────────────────
 * Reads from the global `translations` object (translations.js).
 * Used by all pages.
 */

let currentLang = localStorage.getItem('yd_lang') || 'en';

function t(key) {
  const entry = translations[key];
  if (!entry) { console.warn('[i18n] missing key:', key); return key; }
  return entry[currentLang] ?? entry['en'] ?? key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-aria]').forEach(el => {
    el.setAttribute('aria-label', t(el.dataset.i18nAria));
  });
}

function applyLang() {
  const isAr = currentLang === 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = isAr ? 'rtl' : 'ltr';
  document.body.classList.toggle('ar', isAr);
  document.body.classList.toggle('en', !isAr);
  applyTranslations();
  // Update any visible lang toggles
  document.querySelectorAll('.js-lang-toggle').forEach(el => {
    el.textContent = isAr ? 'English' : 'العربية';
  });
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  localStorage.setItem('yd_lang', currentLang);
  applyLang();
  if (typeof buildStoreCluster === 'function') buildStoreCluster();
}

</script>

<script>
/**
 * Yourdis — App Script
 * ─────────────────────────────────────────
 * Handles: store cluster, scroll reveal, analytics.
 * Loaded only by index.html (landing page).
 */

/* ── Store discovery: orbital pill cluster ── */
function seededRandom(seed) {
  const x = Math.sin(seed * 9973.13) * 10000;
  return x - Math.floor(x);
}
function buildStoreCluster() {
  const wrap = document.getElementById('store-cluster');
  if (!wrap || !Array.isArray(stores)) return;
  const n = stores.length;
  // Concentric orbital rings around an empty center — pill count grows with ring radius
  // so spacing stays even; each ring is angle-offset from the last to avoid "spoke" alignment.
  // Radius scales down on narrow viewports so wide pills at the horizontal extremes never clip.
  const narrow = window.innerWidth < 560;
  const scale = narrow ? 0.72 : 1;
  const rings = [
    { count: 4, radius: 20 * scale },
    { count: 8, radius: 38 * scale },
    { count: Math.max(0, n - 12), radius: 56 * scale },
  ];
  let idx = 0;
  let html = '';
  rings.forEach((ring, ringIdx) => {
    const step = 360 / ring.count;
    const offset = ringIdx * (step / 2.4) + ringIdx * 9;
    for (let i = 0; i < ring.count && idx < n; i++, idx++) {
      const s = stores[idx];
      const name = s[currentLang] ?? s.en;
      const angle = (step * i + offset) * Math.PI / 180;
      const jitter = (seededRandom(idx * 4.4) - 0.5) * 2.4;
      const r = ring.radius + jitter;
      const x = (50 + Math.cos(angle) * r).toFixed(2);
      const y = (50 + Math.sin(angle) * r).toFixed(2);
      const delay = (idx * 0.04).toFixed(2);
      html += `<button type="button" class="store-pill" style="left:${x}%;top:${y}%;transition-delay:${delay}s" aria-label="${name}"><span>${name}</span></button>`;
    }
  });
  wrap.innerHTML = html;
}
document.getElementById('store-cluster')?.addEventListener('click', (e) => {
  const btn = e.target.closest('.store-pill');
  if (!btn) return;
  btn.classList.toggle('selected');
});
const revealBtn = document.getElementById('reveal-stores-btn');
const revealStage = document.getElementById('store-reveal-stage');
revealBtn?.addEventListener('click', () => {
  const isRevealed = revealStage.classList.toggle('revealed');
  revealBtn.setAttribute('aria-expanded', String(isRevealed));
});
// Auto-reverse when the section leaves the viewport, so every visit can replay the reveal.
const storesSection = document.getElementById('stores');
if (storesSection && revealStage) {
  const storesSectionObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting && revealStage.classList.contains('revealed')) {
        revealStage.classList.remove('revealed');
        revealBtn?.setAttribute('aria-expanded', 'false');
        revealStage.querySelectorAll('.store-pill.selected').forEach(p => p.classList.remove('selected'));
      }
    });
  }, { threshold: 0 });
  storesSectionObs.observe(storesSection);
}

/* ── Scroll reveal ── */
const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.fade-up, .fade-left, .fade-right, .fade-scale, .draw-in').forEach(el => revealObs.observe(el));

/* ── KPI count-up ── */
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function animateCount(el) {
  const target = parseInt(el.dataset.countTo, 10);
  const suffix = el.dataset.suffix || '';
  if (prefersReducedMotion || !target) { el.textContent = target.toLocaleString('en-US') + suffix; return; }
  const dur = 1400;
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(target * eased).toLocaleString('en-US') + suffix;
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
const kpiObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { animateCount(e.target); kpiObs.unobserve(e.target); }
  });
}, { threshold: 0.4 });
document.querySelectorAll('.stat-number[data-count-to]').forEach(el => kpiObs.observe(el));

/* ── Analytics helpers ── */
function trackEvent(name, params) {
  if (typeof gtag === 'function') gtag('event', name, params || {});
}
document.querySelectorAll('#btn-appstore, #btn-appstore-hero').forEach(el => el.addEventListener('click', () => {
  trackEvent('app_download_click', { store: 'app_store', page_lang: currentLang });
}, { passive: true }));
document.querySelectorAll('#btn-googleplay, #btn-googleplay-hero').forEach(el => el.addEventListener('click', () => {
  trackEvent('app_download_click', { store: 'google_play', page_lang: currentLang });
}, { passive: true }));

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  applyLang();
  buildStoreCluster();
});

</script>
