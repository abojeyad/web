/* ══════════════════════════════════════════
   YOURDIS — SHARED STYLESHEET
   Used by all pages. Page-specific rules are
   grouped at the bottom.
══════════════════════════════════════════ */

/* ─── Tokens ─── */
:root {
  --crimson: #79002F;
  --crimson-deep: #4C0025;
  --gold: #EAA005;
  --gold-pale: #fdf3da;
  --cream: #FDF6EE;
  --parchment: #F5EDE0;
  --cashback-bg: #F7EFE5;
  --ink: #1a0a0f;
  --muted: #7a5f68;
  --border: rgba(121,0,47,0.11);
  --white: #ffffff;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-lg: 28px;

  /* Spacing scale (4/8pt rhythm) */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;
  --space-9: 96px;

  /* Elevation scale */
  --shadow-sm: 0 2px 12px rgba(121,0,47,0.07);
  --shadow-md: 0 8px 28px rgba(121,0,47,0.09);
  --shadow-lg: 0 18px 52px rgba(121,0,47,0.12);
  --shadow-xl: 0 28px 80px rgba(121,0,47,0.16);

  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --dur-fast: 150ms;
  --dur-base: 250ms;
  --dur-slow: 400ms;
}

/* ─── Reset & Base ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); overflow-x: hidden; }
body.ar { font-family: 'Cairo', sans-serif; direction: rtl; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ─── Focus & Motion ─── */
a:focus-visible, button:focus-visible {
  outline: 2.5px solid var(--crimson);
  outline-offset: 3px;
  border-radius: 4px;
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  .fade-up, .fade-left, .fade-right, .fade-scale, .draw-in { opacity: 1 !important; transform: none !important; }
}

/* ─── Shared Sections ─── */
section { padding: 100px 24px; }
.container { max-width: 1100px; margin: 0 auto; }
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 5vw, 48px); font-weight: 900;
  line-height: 1.15; color: var(--ink); margin-bottom: 18px;
}
body.ar .section-title { font-family: 'Cairo', sans-serif; line-height: 1.4; }
.section-sub { font-size: 16px; color: var(--muted); line-height: 1.75; max-width: 520px; }

/* ─── Animations ─── */
.fade-up { opacity: 0; transform: translateY(26px); transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out); }
.fade-up.visible { opacity: 1; transform: translateY(0); }
.fade-left { opacity: 0; transform: translateX(-28px); transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out); }
.fade-left.visible { opacity: 1; transform: translateX(0); }
.fade-right { opacity: 0; transform: translateX(28px); transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out); }
.fade-right.visible { opacity: 1; transform: translateX(0); }
.fade-scale { opacity: 0; transform: scale(0.94); transition: opacity 0.75s var(--ease-out), transform 0.75s var(--ease-out); }
.fade-scale.visible { opacity: 1; transform: scale(1); }
.fade-up-d1 { transition-delay: 0.10s; }
.fade-up-d2 { transition-delay: 0.20s; }
.fade-up-d3 { transition-delay: 0.30s; }
.fade-up-d4 { transition-delay: 0.40s; }


/* ══════════════════════════════════════════
   LANDING PAGE V2 — 10 SLIDES
══════════════════════════════════════════ */

/* ─── Generic slide shell ─── */
.slide { padding: var(--space-6) 24px; position: relative; overflow: hidden; scroll-margin-top: 76px; }
.slide-inner { max-width: 1180px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }

.slide-body { font-size: 16px; color: var(--muted); line-height: 1.8; max-width: 480px; }

/* ─── Text + Visual grid (reused by slides 1, 3, 7, 9) ─── */
.tv-grid { display: grid; grid-template-columns: 1fr; grid-template-areas: "text" "visual" "highlights"; gap: var(--space-6); }

}

/* ─── Highlight list: short key-point bullets under a slide-body ─── */

.highlight-card-desc { font-size: 12.5px; color: var(--muted); line-height: 1.55; }

/* ─── Download CTA: single smart button (Hero + Final CTA) ─── */

.download-btn {

  padding: 15px 30px; border-radius: 50px;

}

.download-btn:active { transform: translateY(0); }
.download-btn svg { width: 19px; height: 19px; flex-shrink: 0; }

/* ─── Device mockup (pre-made mockup image, frame baked in — shown as-is) ─── */
.device-stage { position: relative; display: flex; justify-content: center; align-items: flex-start; padding: 0; }

}

@media (prefers-reduced-motion: reduce) { .device-mockup { animation: none; } }

/* ─── KPI stats: merged into the hero slide ─── */
.kpi-inner { max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-5); }
.hero-kpi { margin-top: var(--space-8); }
.stat-item {
  display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px;
  padding: 30px 14px; border-radius: var(--radius);
  background: linear-gradient(160deg, var(--white) 0%, var(--gold-pale) 160%);
  border: 1.5px solid var(--border); box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden;
  transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out);
}
.stat-item::before { content: ''; position: absolute; top: -46px; inset-inline-end: -36px; width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, rgba(234,160,5,0.16) 0%, transparent 72%); pointer-events: none; }

.stat-item:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); border-color: rgba(234,160,5,0.4); }
.stat-icon { position: relative; z-index: 1; width: 44px; height: 44px; border-radius: 13px; background: linear-gradient(150deg, var(--crimson), var(--crimson-deep)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 6px 16px rgba(121,0,47,0.28); }

.hero-slide { min-height: 100svh; background: var(--cream); display: flex; flex-direction: column; justify-content: center; padding: 128px 24px var(--space-9); }
.hero-slide .slide-glow.a { width: 640px; height: 640px; background: radial-gradient(circle, rgba(234,160,5,0.08) 0%, transparent 70%); top: -220px; inset-inline-end: -200px; }

@media (min-width: 1024px) { .hero-sub { text-align: start; } }

<script>
/**
 * Yourdis — i18n Engine
 * ─────────────────────────────────────────
 * Reads from the global `translations` object (translations.js).
 * Used by all pages.
 */

let currentLang = localStorage.getItem('yd_lang') || 'en';

function t(key) {
  const entry = translations[key];
  if (!entry) { console.warn('[i18n] missing key:', key); return key; }
  return entry[currentLang] ?? entry['en'] ?? key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-aria]').forEach(el => {
    el.setAttribute('aria-label', t(el.dataset.i18nAria));
  });
}

function applyLang() {
  const isAr = currentLang === 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = isAr ? 'rtl' : 'ltr';
  document.body.classList.toggle('ar', isAr);
  document.body.classList.toggle('en', !isAr);
  applyTranslations();
  // Update any visible lang toggles
  document.querySelectorAll('.js-lang-toggle').forEach(el => {
    el.textContent = isAr ? 'English' : 'العربية';
  });
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  localStorage.setItem('yd_lang', currentLang);
  applyLang();
}

</script>

<script>
/**
 * Yourdis — App Script
 * ─────────────────────────────────────────
 * Handles: scroll reveal, analytics.
 * Loaded only by index.html (landing page).
 */

/* ── Scroll reveal ── */
const revealObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.fade-up, .fade-left, .fade-right, .fade-scale, .draw-in').forEach(el => revealObs.observe(el));

/* ── KPI count-up ── */
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function animateCount(el) {
  const target = parseInt(el.dataset.countTo, 10);
  const suffix = el.dataset.suffix || '';
  if (prefersReducedMotion || !target) { el.textContent = target.toLocaleString('en-US') + suffix; return; }
  const dur = 1400;
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(target * eased).toLocaleString('en-US') + suffix;
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
const kpiObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { animateCount(e.target); kpiObs.unobserve(e.target); }
  });
}, { threshold: 0.4 });
document.querySelectorAll('.stat-number[data-count-to]').forEach(el => kpiObs.observe(el));

/* ── Analytics helpers ── */
function trackEvent(name, params) {
  if (typeof gtag === 'function') gtag('event', name, params || {});
}

/* ── Smart download button: routes to the right store per OS ── */
function resolveStoreDestination() {
  const ua = navigator.userAgent || navigator.vendor || '';
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /Android/.test(ua);
  if (isIOS) return { url: 'https://apps.apple.com/sa/app/yourdis/id6584529767', store: 'app_store' };
  if (isAndroid) return { url: 'https://play.google.com/store/apps/details?id=com.yourdis', store: 'google_play' };
  return { url: 'https://yourdis.com', store: 'desktop_web' };
}
const storeDestination = resolveStoreDestination();
document.querySelectorAll('.js-download-btn').forEach(el => {
  el.href = storeDestination.url;
  el.addEventListener('click', () => {
    trackEvent('app_download_click', { store: storeDestination.store, page_lang: currentLang });
  }, { passive: true });
});

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  applyLang();
});

</script>
</body>
